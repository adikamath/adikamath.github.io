<script src="/assets/js/main.js" defer="defer"></script>
{%- if site.google_analytics -%}
  <!-- Google tag (gtag.js) -->
  <script
  async
  src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "{{ site.google_analytics }}");
  </script>
{%- endif -%}
{%- if page.url == '/archive/' -%}
  <script src="/assets/js/search.min.js"></script>
  <script>
    var archiveList = document.getElementById('archive-list');
    var searchInput = document.getElementById('search-input');
    var sjs = SimpleJekyllSearch({
      searchInput: searchInput,
      resultsContainer: document.getElementById('search-results'),
      json: '/assets/search.json',
      noResultsText: '<li class="search-empty">No posts matched that search.</li>',
      searchResultTemplate:
        '<li class="search-result-item">' +
          '<a class="search-result-link" href="{url}">' +
            '<span class="search-result-date">{date_formatted}</span>' +
            '<strong>{title}</strong>' +
            '<span class="search-result-description">{summary}</span>' +
            '<span class="search-result-meta"><span>{read_time} min read</span><span class="meta-separator">·</span><span class="search-result-tags"><span>tags:</span> {tags_display}</span></span>' +
          '</a>' +
        '</li>',
    });

    if (searchInput && archiveList) {
      searchInput.addEventListener('input', function (event) {
        var hasQuery = event.target.value.trim().length > 0;
        archiveList.hidden = hasQuery;
      });
    }
  </script>
{%- endif -%}
